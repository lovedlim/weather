<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>날씨 요일 카드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 50%, #1a1a3e 0%, #0d0d1a 40%, #0a0a14 100%);
      overflow-x: hidden; color: #fff;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }
    .page {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px 80px; gap: 48px;
    }
    .header { text-align: center; }
    /* 격자·발표 시각 — 줌 영향 없이 좌상단 작은 글씨 */
    .forecast-meta {
      position: fixed;
      top: 12px;
      left: 14px;
      z-index: 50;
      max-width: min(90vw, 380px);
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.02em;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.34);
      text-align: left;
    }
    @media (max-width: 600px) {
      .forecast-meta {
        top: 10px;
        left: 10px;
        font-size: 9px;
        max-width: 78vw;
      }
    }
    .header__title {
      font-size: clamp(28px, 5vw, 52px); font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, #a8c8ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header__date {
      margin-top: 10px; font-size: clamp(13px, 1.5vw, 15px);
      color: rgba(255,255,255,0.4); letter-spacing: 0.05em;
    }
    /* 헤더+카드만 ~130% 줌 (배경 별은 그대로) */
    .scene-zoom {
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(28px, 4vw, 48px);
      transform: scale(1.3);
      transform-origin: center center;
      width: 100%;
      margin-top: 4vh;
      margin-bottom: 14vh; /* scale(1.3)로 아래로 밀려 나온 만큼 · 재생 버튼과 간격 */
    }
    .cards {
      display: flex; gap: clamp(10px, 1.5vw, 16px);
      flex-wrap: nowrap; justify-content: center;
      width: 100%; max-width: 1100px;
    }
    .card {
      flex: 1 1 0; min-width: 110px; max-width: 160px;
      border-radius: 24px; padding: 24px 14px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
      opacity: 0; transform: translateY(60px) scale(0.95);
      transition: box-shadow 0.3s ease, background 0.3s ease,
                  transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card.today {
      background: rgba(99,160,255,0.15); border-color: rgba(99,160,255,0.35);
      box-shadow: 0 8px 40px rgba(60,120,255,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .card.weekend { background: rgba(255,110,130,0.08); border-color: rgba(255,110,130,0.22); }
    .card.animated:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .card.today.animated:hover {
      box-shadow: 0 16px 52px rgba(60,120,255,0.38), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .card__day  { font-size: 13px; font-weight: 600; letter-spacing: .08em; color: rgba(255,255,255,.5); }
    .card.today   .card__day { color: #7db8ff; }
    .card.weekend .card__day { color: #ff8fa0; }
    .card__label  { font-size: clamp(18px, 2.5vw, 22px); font-weight: 800; color: #fff; }
    .card__icon   { font-size: clamp(32px, 4vw, 44px); line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,.4)); }
    .card__condition { font-size: 11px; font-weight: 500; letter-spacing: .04em; color: rgba(255,255,255,.45); }
    .card__temps { display: flex; gap: 8px; align-items: baseline; }
    .card__temp-high { font-size: clamp(20px, 2.5vw, 26px); font-weight: 700; color: #fff; }
    .card__temp-low  { font-size: clamp(13px, 1.6vw, 15px); font-weight: 400; color: rgba(255,255,255,.35); }
    .card__bar { width: 100%; height: 3px; border-radius: 2px; background: rgba(255,255,255,.08); position: relative; overflow: hidden; }
    .card__bar-fill {
      position: absolute; inset: 0; border-radius: 2px;
      background: linear-gradient(90deg, #4a90ff, #a8d4ff);
      transform-origin: left; transform: scaleX(0);
    }
    .card.today   .card__bar-fill { background: linear-gradient(90deg, #63a0ff, #c5e0ff); }
    .card.weekend .card__bar-fill { background: linear-gradient(90deg, #ff6e82, #ffb3bc); }
    /* 카드 등장(cardEnter)과 같은 지연·지속시간으로 채움 — 끝난 뒤가 아니라 함께 움직임 */
    @keyframes barEnter {
      from { transform: scaleX(0); }
      to   { transform: scaleX(var(--bar-pct, 0.6)); }
    }
    .card.animate .card__bar-fill {
      animation: barEnter 5.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(60px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card.animate { animation: cardEnter 5.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .replay-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,.75); font-size: 14px; font-weight: 500;
      letter-spacing: .04em; cursor: pointer; transition: all .25s ease;
    }
    .replay-btn:hover { background: rgba(255,255,255,.13); border-color: rgba(255,255,255,.3); color: #fff; transform: scale(1.04); }
    .replay-btn:active { transform: scale(.97); }
    .replay-btn svg { width: 16px; height: 16px; transition: transform .5s ease; }
    .replay-btn:hover svg { transform: rotate(180deg); }
    .page-disclaimer {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 50;
      max-width: min(88vw, 360px);
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.02em;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.26);
      text-align: left;
    }
    @media (max-width: 600px) {
      .page-disclaimer {
        bottom: 10px;
        left: 10px;
        font-size: 9px;
        max-width: calc(100vw - 240px);
      }
    }

    .forecast-status {
      text-align: center; font-size: 13px; font-weight: 500;
      color: rgba(180, 210, 255, 0.85); margin: -8px 0 4px; min-height: 1.4em;
    }
    .forecast-status.forecast-status--error { color: #ffb4b4; }

    /* Render panel */
    .rpanel {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      width: 256px;
      background: rgba(8,8,20,.90);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      box-shadow: 0 20px 56px rgba(0,0,0,.6);
      overflow: hidden;
    }
    .rpanel__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px 11px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      cursor: pointer; user-select: none;
    }
    .rpanel__title {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 600; color: rgba(255,255,255,.82);
    }
    .rpanel__badge {
      font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 5px;
      background: rgba(60,180,80,.22); color: #6edb8a; letter-spacing: .04em;
    }
    .rpanel__badge.unsupported { background: rgba(255,80,80,.18); color: #ff9090; }
    .rpanel__chevron { font-size: 10px; color: rgba(255,255,255,.25); transition: transform .3s; }
    .rpanel.is-collapsed .rpanel__chevron { transform: rotate(180deg); }
    .rpanel.is-collapsed .rpanel__body { display: none; }
    .rpanel__body { padding: 14px 16px 16px; }
    .rrow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
    .rrow label { font-size: 11.5px; color: rgba(255,255,255,.36); font-weight: 500; }
    .ropts { display: flex; gap: 5px; }
    .ropt {
      padding: 4px 10px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.36); font-size: 11.5px; font-weight: 500;
      cursor: pointer; transition: all .18s; font-family: inherit;
    }
    .ropt.is-on { background: rgba(99,160,255,.2); border-color: rgba(99,160,255,.4); color: #9dceff; }
    .ropt:hover:not(.is-on) { background: rgba(255,255,255,.08); color: rgba(255,255,255,.65); }
    .rdivider { height: 1px; background: rgba(255,255,255,.06); margin: 10px 0 12px; }
    .rstart {
      width: 100%; padding: 11px 12px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #2e55b8, #5487ef);
      color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .03em;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .rstart:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); }
    .rstart:active:not(:disabled) { transform: translateY(0); filter: brightness(.94); }
    .rstart:disabled { opacity: .4; cursor: not-allowed; }
    .rprogress { margin-top: 11px; display: none; }
    .rprogress.is-on { display: block; }
    .rprogress__track { height: 4px; border-radius: 2px; background: rgba(255,255,255,.07); overflow: hidden; margin-bottom: 8px; }
    .rprogress__fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #2e55b8, #5487ef); width: 0; transition: width .06s linear; }
    .rprogress__label { font-size: 11px; color: rgba(255,255,255,.35); line-height: 1.5; }
    .rinfo {
      margin-top: 9px; padding: 8px 10px; border-radius: 10px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
      font-size: 10.5px; color: rgba(255,255,255,.32); line-height: 1.6; display: none;
    }
    .rinfo.is-on { display: block; }
    @media (max-width: 600px) {
      .scene-zoom {
        transform: scale(1.08);
        margin-bottom: 10vh;
      }
      .cards { gap: 8px; }
      .card { min-width: 80px; padding: 18px 10px 16px; border-radius: 18px; gap: 8px; }
      .card__temps { flex-direction: column; gap: 2px; align-items: center; }
      .rpanel { bottom: 12px; right: 12px; width: 220px; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="page">
    <p class="forecast-meta" id="headerCity" aria-label="예보 출처">서울 · 기상청 단기예보</p>
    <div class="scene-zoom">
      <header class="header">
        <h1 class="header__title" id="headerTitle">날씨</h1>
        <p class="header__date" id="headerDate"></p>
      </header>
      <p id="forecastStatus" class="forecast-status" hidden></p>
      <div class="cards" id="cards"></div>
    </div>
    <button class="replay-btn" onclick="window._runAnimation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
      </svg>
      애니메이션 다시 보기
    </button>
    <p class="page-disclaimer">기상청 단기예보(공공데이터) · 연결 실패 시 예시 데이터</p>
  </div>

  <div class="rpanel is-collapsed" id="rpanel">
    <div class="rpanel__head" onclick="window._togglePanel()">
      <span class="rpanel__title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
        MP4 렌더링
        <span class="rpanel__badge" id="codecBadge">확인 중...</span>
      </span>
      <span class="rpanel__chevron">▼</span>
    </div>
    <div class="rpanel__body">
      <div class="rrow">
        <label>해상도</label>
        <div class="ropts" id="resOpts">
          <button class="ropt" data-w="1920" data-h="1080">1080p</button>
          <button class="ropt is-on" data-w="3840" data-h="2160">4K</button>
        </div>
      </div>
      <div class="rrow">
        <label>프레임</label>
        <div class="ropts" id="fpsOpts">
          <button class="ropt is-on" data-fps="60">60fps</button>
          <button class="ropt" data-fps="30">30fps</button>
        </div>
      </div>
      <div class="rrow" style="margin-bottom:0">
        <label>품질</label>
        <div class="ropts" id="qualOpts">
          <button class="ropt" data-br1080="12" data-br4k="40">표준</button>
          <button class="ropt is-on" data-br1080="24" data-br4k="80">고품질</button>
        </div>
      </div>
      <div class="rdivider"></div>
      <button class="rstart" id="rStartBtn" onclick="window._startRender()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        렌더링 시작
      </button>
      <div class="rprogress" id="rprogress">
        <div class="rprogress__track"><div class="rprogress__fill" id="rprogressFill"></div></div>
        <div class="rprogress__label" id="rprogressLabel">준비 중...</div>
      </div>
      <div class="rinfo is-on" id="rinfo">
        프레임 단위 직접 인코딩 · 화면 캡처 아님<br>
        WebCodecs + mp4-muxer · H.264 · fastStart: in-memory<br>
        콘솔의 file:// 경고는 확장·DevTools 때문인 경우가 많습니다 (이 페이지는 CDN 미사용).
      </div>
    </div>
  </div>

  <canvas id="recCanvas" style="display:none"></canvas>

  <!-- ── mp4-muxer 5.2.2 (inlined, no CDN required) ── -->

    /* ── Canvas utils ── */
    function rrect(ctx, x, y, w, h, r) {
      if (ctx.roundRect) { ctx.roundRect(x,y,w,h,r); return; }
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
    }

    /* Deterministic RNG (mulberry32) */
    function mkRng(seed) {
      let s = seed;
      return () => {
        s |= 0; s = s + 0x6D2B79F5 | 0;
        let t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function mkStars(W, H) {
      const rng = mkRng(42);
      const n = Math.round(W * H / 11000);
      return Array.from({ length: n }, () => ({
        x: rng()*W, y: rng()*H,
        r: (rng()*1.4+0.4)*(W/1920),
        a: 0.07 + rng()*.55,
      }));
    }

    /* ── Frame drawing ── */
    const FONT = "'Apple SD Gothic Neo','Noto Sans KR',sans-serif";
    const SCENE_ZOOM = 1.3;

    function drawBg(ctx, W, H) {
      const g = ctx.createRadialGradient(W*.2,H*.5,0,W*.5,H*.5,W*.9);
      g.addColorStop(0,'#1a1a3e'); g.addColorStop(.4,'#0d0d1a'); g.addColorStop(1,'#0a0a14');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    }

    function drawStars(ctx, stars) {
      stars.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill();
      });
    }

    function drawHeader(ctx, W, H) {
      const sc=W/1920, cx=W/2;
      ctx.save(); ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.font=`400 ${14*sc}px ${FONT}`; ctx.fillStyle='rgba(255,255,255,.42)';
      ctx.fillText('KMA VILAGE FCST', cx, H*.17);
      const tsz=52*sc;
      ctx.font=`700 ${tsz}px ${FONT}`;
      const tg=ctx.createLinearGradient(cx-220*sc,0,cx+220*sc,0);
      tg.addColorStop(0,'#fff'); tg.addColorStop(1,'#a8c8ff');
      ctx.fillStyle=tg; const ty=H*.17+22*sc;
      const nd = Math.max(forecastDays.length, 1);
      ctx.fillText(`${nd}일 날씨`, cx, ty);
      ctx.font=`400 ${14*sc}px ${FONT}`; ctx.fillStyle='rgba(255,255,255,.38)';
      ctx.fillText(DATE_STR, cx, ty+tsz+10*sc);
      ctx.restore();
    }

    function drawCard(ctx, idx, prog, barProg, W, H) {
      const p = Math.min(1, Math.max(0, prog));
      if (p <= 0) return;
      const row = forecastDays[idx];
      if (!row) return;
      const sc=W/1920;
      const cw=148*sc, ch=250*sc, gap=15*sc;
      const n = forecastDays.length;
      if (n <= 0) return;
      const x0=(W-(n*cw+(n-1)*gap))/2, ytop=H*.42;
      const cx=x0+idx*(cw+gap)+cw/2, cy=ytop+ch/2;
      const isToday=row.isToday, isWeekend=row.isWeekend;
      const d=row;

      ctx.save();
      ctx.globalAlpha=p;
      ctx.translate(cx, cy+(1-p)*64*sc);
      ctx.scale(.95+.05*p,.95+.05*p);
      ctx.translate(-cx,-cy);

      const x=cx-cw/2, y=ytop, r=22*sc;

      ctx.shadowColor=isToday?'rgba(60,120,255,.28)':'rgba(0,0,0,.42)';
      ctx.shadowBlur=28*sc; ctx.shadowOffsetY=7*sc;
      ctx.beginPath(); rrect(ctx,x,y,cw,ch,r);
      ctx.fillStyle=isToday?'rgba(99,160,255,.17)':isWeekend?'rgba(255,110,130,.09)':'rgba(255,255,255,.068)';
      ctx.fill();
      ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

      ctx.beginPath(); rrect(ctx,x,y,cw,ch,r);
      const ig=ctx.createLinearGradient(x,y,x,y+ch*.38);
      ig.addColorStop(0,'rgba(255,255,255,.11)'); ig.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=ig; ctx.fill();

      ctx.beginPath(); rrect(ctx,x,y,cw,ch,r);
      ctx.strokeStyle=isToday?'rgba(99,160,255,.42)':isWeekend?'rgba(255,110,130,.30)':'rgba(255,255,255,.13)';
      ctx.lineWidth=sc; ctx.stroke();

      ctx.textAlign='center'; ctx.textBaseline='top';
      let gy=y+21*sc;

      ctx.font=`600 ${12*sc}px ${FONT}`;
      ctx.fillStyle=isToday?'#7db8ff':isWeekend?'#ff8fa0':'rgba(255,255,255,.48)';
      ctx.fillText(row.labelEn,cx,gy); gy+=19*sc;

      ctx.font=`800 ${22*sc}px ${FONT}`; ctx.fillStyle='#fff';
      ctx.fillText(row.labelKo,cx,gy); gy+=30*sc;

      ctx.font=`${40*sc}px serif`; ctx.fillText(d.icon,cx,gy); gy+=50*sc;

      ctx.font=`500 ${11*sc}px ${FONT}`; ctx.fillStyle='rgba(255,255,255,.44)';
      ctx.fillText(d.condition,cx,gy); gy+=20*sc;

      ctx.textBaseline='alphabetic';
      ctx.font=`700 ${26*sc}px ${FONT}`; ctx.fillStyle='#fff';
      ctx.fillText(d.high != null ? `${d.high}°` : '—',cx-13*sc,gy+22*sc);
      ctx.font=`400 ${14*sc}px ${FONT}`; ctx.fillStyle='rgba(255,255,255,.34)';
      ctx.fillText(d.low != null ? `${d.low}°` : '—',cx+19*sc,gy+22*sc);
      gy+=32*sc;

      const bx=x+14*sc, bw=cw-28*sc, bh=3*sc, by=gy+5*sc;
      ctx.beginPath(); rrect(ctx,bx,by,bw,bh,bh/2);
      ctx.fillStyle='rgba(255,255,255,.07)'; ctx.fill();
      const fw=bw*(d.bar ?? 0.5)*barProg;
      if (fw>0) {
        const bg=ctx.createLinearGradient(bx,0,bx+bw,0);
        if(isToday){bg.addColorStop(0,'#63a0ff');bg.addColorStop(1,'#c5e0ff');}
        else if(isWeekend){bg.addColorStop(0,'#ff6e82');bg.addColorStop(1,'#ffb3bc');}
        else{bg.addColorStop(0,'#4a90ff');bg.addColorStop(1,'#a8d4ff');}
        ctx.beginPath(); rrect(ctx,bx,by,fw,bh,bh/2);
        ctx.fillStyle=bg; ctx.fill();
      }
      ctx.restore();
    }

    function drawFrame(ctx, W, H, stars, timeMs) {
      drawBg(ctx,W,H); drawStars(ctx,stars);
      ctx.save();
      ctx.translate(W/2, H/2);
      ctx.scale(SCENE_ZOOM, SCENE_ZOOM);
      ctx.translate(-W/2, -H/2);
      drawHeader(ctx,W,H);
      for (let i = 0; i < forecastDays.length; i++) {
        const t=Math.max(0,Math.min(1,(timeMs-i*STAGGER)/CARD_DUR));
        drawCard(ctx,i,ease(t),easeBarWidth(t),W,H);
      }
      ctx.restore();
    }

    function updateHeaderTitle() {
      const el = document.getElementById('headerTitle');
      if (!el) return;
      const n = Math.max(forecastDays.length, 1);
      el.textContent = `${n}일 날씨`;
    }

    /* ── HTML preview ── */
    function buildCards() {
      const el=document.getElementById('cards');
      el.innerHTML='';
      forecastDays.forEach((d,i)=>{
        const c=document.createElement('div');
        c.className='card'+(d.isToday?' today':'')+(d.isWeekend?' weekend':'');
        c.style.setProperty('--bar-pct', String(d.bar ?? 0.5));
        const hi = d.high != null ? `${d.high}°` : '—';
        const lo = d.low != null ? `${d.low}°` : '—';
        c.innerHTML=`
          <span class="card__day">${d.labelEn}</span>
          <span class="card__label">${d.labelKo}</span>
          <span class="card__icon">${d.icon}</span>
          <span class="card__condition">${d.condition}</span>
          <div class="card__temps">
            <span class="card__temp-high">${hi}</span>
            <span class="card__temp-low">${lo}</span>
          </div>
          <div class="card__bar"><div class="card__bar-fill"></div></div>`;
        el.appendChild(c);
      });
      updateHeaderTitle();
    }

    const CARD_STAGGER_S = 0.75;

    function runAnimation() {
      const cards=document.querySelectorAll('.card');
      cards.forEach((c) => {
        c.classList.remove('animate', 'animated');
        c.style.animationDelay = '';
        const fill = c.querySelector('.card__bar-fill');
        if (fill) {
          fill.style.animationDelay = '';
          fill.style.animation = 'none';
        }
      });
      void document.getElementById('cards').offsetHeight;
      cards.forEach((c, i) => {
        const delay = `${i * CARD_STAGGER_S}s`;
        c.style.animationDelay = delay;
        const fill = c.querySelector('.card__bar-fill');
        if (fill) {
          fill.style.removeProperty('animation');
          fill.style.animationDelay = delay;
        }
        c.classList.add('animate');
        c.addEventListener(
          'animationend',
          (e) => {
            if (e.target === c) c.classList.add('animated');
          },
          { once: true },
        );
      });
    }

    function createStars() {
      const el=document.getElementById('stars');
      for(let i=0;i<120;i++){
        const s=document.createElement('div'), sz=Math.random()*2+1;
        s.className='star';
        s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;opacity:${.1+Math.random()*.3}`;
        el.appendChild(s);
      }
    }

    /* ── Panel UI ── */
    function togglePanel() {
      document.getElementById('rpanel').classList.toggle('is-collapsed');
    }
    document.querySelectorAll('.ropts').forEach(g=>{
      g.addEventListener('click',e=>{
        const b=e.target.closest('.ropt'); if(!b) return;
        g.querySelectorAll('.ropt').forEach(x=>x.classList.remove('is-on'));
        b.classList.add('is-on');
      });
    });
    function getSettings() {
      const r=document.querySelector('#resOpts .ropt.is-on');
      const f=document.querySelector('#fpsOpts .ropt.is-on');
      const q=document.querySelector('#qualOpts .ropt.is-on');
      const w=+r.dataset.w, h=+r.dataset.h;
      const br=(w>=3840?+q.dataset.br4k:+q.dataset.br1080)*1_000_000;
      return {w,h,fps:+f.dataset.fps,bitrate:br};
    }
    function setCodecBadge(ok, label) {
      const b=document.getElementById('codecBadge');
      if(ok){b.textContent='WebCodecs ✓';b.classList.remove('unsupported');}
      else{b.textContent=label||'미지원';b.classList.add('unsupported');
           document.getElementById('rStartBtn').disabled=true;}
    }
    const ICON_PLAY   = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    const ICON_PAUSE  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    const ICON_STOP   = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>';

    function setUI(state) {
      const btn=document.getElementById('rStartBtn');
      const prg=document.getElementById('rprogress');
      const inf=document.getElementById('rinfo');
      if(state==='busy'){
        /* Switch to cancel button */
        btn.disabled=false;
        btn.style.background='linear-gradient(135deg,#7a2020,#c43c3c)';
        btn.innerHTML=ICON_STOP+'취소';
        btn.onclick=()=>window._cancelRender();
        prg.classList.add('is-on'); inf.classList.remove('is-on');
        document.getElementById('rprogressFill').style.width='0%';
        document.getElementById('rprogressLabel').textContent='코덱 확인 · muxer 초기화 중…';
      } else if(state==='done'){
        btn.style.background='';
        btn.innerHTML=ICON_PLAY+'렌더링 시작';
        btn.onclick=()=>window._startRender();
        document.getElementById('rprogressLabel').textContent='✓ MP4 다운로드 완료!';
        document.getElementById('rprogressFill').style.width='100%';
        setTimeout(()=>{prg.classList.remove('is-on');inf.classList.add('is-on');
          document.getElementById('rprogressFill').style.width='0';},3500);
      } else if(state==='cancelled'){
        btn.style.background='';
        btn.innerHTML=ICON_PLAY+'렌더링 시작';
        btn.onclick=()=>window._startRender();
        document.getElementById('rprogressFill').style.width='0%';
        setTimeout(()=>{prg.classList.remove('is-on');inf.classList.add('is-on');},2500);
      } else if(state==='error'){
        btn.style.background='';
        btn.innerHTML=ICON_PLAY+'렌더링 시작';
        btn.onclick=()=>window._startRender();
        setTimeout(()=>prg.classList.remove('is-on'),5000);
      }
    }
    function updateProgress(i, total) {
      const done = Math.min(i + 1, total);
      const pct = Math.round((done / total) * 100);
      document.getElementById('rprogressFill').style.width=`${pct}%`;
      document.getElementById('rprogressLabel').textContent=
        `프레임 ${done} / ${total} (${pct}%) · 인코딩 중`;
    }

    /* ── WebCodecs check ── */
    if (!('VideoEncoder' in window)) {
      setCodecBadge(false, 'Chrome 94+ 필요');
    } else {
      setCodecBadge(true);
    }

    /* ── Frame-by-frame MP4 renderer ── */
    let rendering = false;
    let cancelled = false;

    function cancelRender() {
      if (!rendering) return;
      cancelled = true;
    }

    async function startRender() {
      if (rendering || !('VideoEncoder' in window)) return;
      rendering = true;
      cancelled = false;
      setUI('busy');

      const {w,h,fps,bitrate} = getSettings();
      const totalFrames = Math.ceil(getTotalMs() * fps / 1000);
      const msPerFrame  = 1000 / fps;

      const canvas = document.getElementById('recCanvas');
      canvas.width=w; canvas.height=h;
      const ctx = canvas.getContext('2d', {willReadFrequently:false});
      const stars = mkStars(w, h);

      /* Codec negotiation */
      const codecs = w>=3840
        ? ['avc1.640034','avc1.640033','avc1.4d4033','avc1.42e034']
        : ['avc1.640028','avc1.64002a','avc1.4d401f','avc1.42e01f'];

      let finalCodec = null;
      for (const c of codecs) {
        try {
          const r = await VideoEncoder.isConfigSupported({codec:c,width:w,height:h,bitrate,framerate:fps});
          if (r.supported) { finalCodec=c; break; }
        } catch(_) {}
      }
      if (!finalCodec) {
        document.getElementById('rprogressLabel').textContent='지원되는 H.264 코덱 없음 (Chrome 94+ 필요)';
        setUI('error'); rendering=false; return;
      }

      /* mp4-muxer setup — fastStart required in v5 (undefined throws) */
      let target, muxer, encoder;
      try {
        target = new ArrayBufferTarget();
        muxer  = new Muxer({
          target,
          video:{ codec:'avc', width:w, height:h, frameRate:fps },
          firstTimestampBehavior:'offset',
          fastStart:'in-memory'
        });
      } catch (e) {
        document.getElementById('rprogressLabel').textContent='Muxer 오류: ' + e.message;
        setUI('error'); rendering=false; return;
      }

      let encError = null;
      encoder = new VideoEncoder({
        output: (chunk,meta) => muxer.addVideoChunk(chunk,meta),
        error:  e => { encError=e; },
      });
      encoder.configure({codec:finalCodec,width:w,height:h,bitrate,framerate:fps});

      document.getElementById('rprogressLabel').textContent=
        `총 ${totalFrames}프레임 · 그리기 시작…`;
      await new Promise(r => setTimeout(r, 0));

      /* Render loop — deterministic, no screen capture */
      for (let i=0; i<totalFrames; i++) {
        if (cancelled) {
          encoder.close();
          document.getElementById('rprogressLabel').textContent='취소되었습니다.';
          setUI('cancelled'); rendering=false; return;
        }
        if (encError) {
          document.getElementById('rprogressLabel').textContent=`인코더 오류: ${encError.message}`;
          setUI('error'); rendering=false; return;
        }
        const timeMs = i * msPerFrame;
        drawFrame(ctx, w, h, stars, timeMs);

        const vf = new VideoFrame(canvas, { timestamp: Math.round(timeMs * 1000) });
        encoder.encode(vf, { keyFrame: i % (fps * 2) === 0 });
        vf.close();

        updateProgress(i, totalFrames);
        if (i % 2 === 0)
          await new Promise(r => setTimeout(r, 0));
        while (encoder.encodeQueueSize > 40)
          await new Promise(r => setTimeout(r, 8));
      }

      /* Final held frame */
      drawFrame(ctx, w, h, stars, getTotalMs());

      await encoder.flush();
      muxer.finalize();

      const blob = new Blob([target.buffer], {type:'video/mp4'});
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'),
        {href:url, download:`weather-${w}x${h}-${fps}fps.mp4`});
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 15_000);

      updateProgress(totalFrames, totalFrames);
      setUI('done');
      rendering = false;
    }

    /* ── Init ── */
    document.getElementById('headerDate').textContent = DATE_STR;
    createStars();
    await loadForecast();
    buildCards();
    requestAnimationFrame(()=>setTimeout(runAnimation, 150));

    window._runAnimation  = runAnimation;
    window._togglePanel   = togglePanel;
    window._startRender   = startRender;
    window._cancelRender  = cancelRender;

  })();
  </script>
</body>
</html>
